<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Maria ❤️</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .task { display: none; padding-top: 20px; }
        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 15px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .big { font-size: 26px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .msgBox {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            width: 85%;
            margin: 15px auto;
            border-radius: 15px;
            font-weight: bold;
            min-height: 60px;
            line-height: 1.5;
            color: #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #gameArea {
            width: 90%;
            max-width: 400px;
            height: 400px;
            background: #111;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 3px solid #fff;
        }
        .blur { filter: blur(10px); width: 250px; border-radius: 10px; cursor: pointer; transition: 0.5s; }
        .tap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; pointer-events: none; }
        .emoji-item { font-size: 45px; cursor: pointer; position: absolute; transition: transform 0.2s; user-select: none; }
        .emoji-item:hover { transform: scale(1.2); }
        #dropZone img { width: 100%; height: 100%; object-fit: cover; border-radius: 0; }
    </style>
</head>
<body>

<audio id="song1" src="song1.mp3" loop></audio>
<audio id="song2" src="song2.mp3" loop></audio>

<div id="task1" class="task" style="display:block">
    <h2 class="big">Something for you Maria 💖</h2>
    <h3>Catch my 20 hearts, GENTLY</h3>
    <div id="gameArea"></div>
</div>

<div id="task1done" class="task">
    <h2>Great! You have completed the task</h2>
    <button onclick="typeText('t1msg',msg1)">Tap to read message</button>
    <div class="msgBox" id="t1msg"></div>
    <button onclick="next('task2')">Next</button>
</div>

<div id="task2" class="task">
    <h2>Find the missing part of me</h2>
    <button onclick="showHint()">Tap to read Hint 💡</button>
    <div class="msgBox" id="hintBox"></div>

    <div style="width:320px;height:220px;border:4px solid white;margin:auto;position:relative;overflow:hidden;background:#fff;display:flex;">
        <div id="dropZone" style="width:50%;height:100%;position:relative;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#ccc">Missing</div>
        <img src="male.jpeg" style="width:50%;height:100%;object-fit:cover;">
    </div>

    <div id="emojiArea" style="height:350px;position:relative;margin-top:20px;"></div>
    <div class="msgBox" id="t2msg"></div>
</div>

<div id="task2done" class="task">
    <h2>Task 2 Completed! 💖</h2>
    <button onclick="typeText('t2done',msg2)">Tap to read message</button>
    <div class="msgBox" id="t2done"></div>
    <button onclick="next('task3')">Next</button>
</div>

<div id="task3" class="task">
    <h2>Open my heart 🔒</h2>
    <button onclick="tryKey(1)">Key-1</button>
    <button onclick="tryKey(2)">Key-2</button>
    <button onclick="tryKey(3)">Key-3</button>
    <div id="heart" style="font-size:80px; margin: 20px;">🔒</div>
    <button id="t3btn" style="display:none;" onclick="typeText('t3msg',msg3)">Tap to read message</button>
    <div class="msgBox" id="t3msg"></div>
    <button id="go4" style="display:none;" onclick="next('task4_1')">Let's move forward next</button>
</div>

<div id="task4_1" class="task">
    <div style="position:relative; display: inline-block;">
        <img src="maria1.jpeg" class="blur" onclick="reveal(this,1)">
        <div class="tap">Tap to see</div>
    </div>
    <button onclick="typeText('m1',msg4_1)">Tap to read message</button>
    <div class="msgBox" id="m1"></div>
    <button onclick="next('task4_2')">Next</button>
</div>

<div id="task4_2" class="task">
    <div style="position:relative; display: inline-block;">
        <img src="maria2.jpeg" class="blur" onclick="reveal(this,2)">
        <div class="tap">Tap to see</div>
    </div>
    <button onclick="typeText('m2',msg4_2)">Tap to read message</button>
    <div class="msgBox" id="m2"></div>
    <button onclick="next('task4_3')">Next</button>
</div>

<div id="task4_3" class="task">
    <div style="position:relative; display: inline-block;">
        <img src="maria3.jpeg" class="blur" onclick="reveal(this,3)">
        <div class="tap">Tap to see</div>
    </div>
    <button onclick="typeText('m3',msg4_3)">Tap to read message</button>
    <div class="msgBox" id="m3"></div>
    <button onclick="next('task5')">Tap here and Lets celebrate together</button>
</div>

<div id="task5" class="task">
    <h2>🎁 Eid Salami 💖</h2>
    <button onclick="startGift()">Tap to Open your Eid gift 🎁</button>
    <div class="msgBox" id="giftBox"></div>
</div>

<div id="finalScreen" class="task">
    <h2>Eid Mubarak Maria ❤️</h2>
    <div class="msgBox" id="finalMsg"></div>
</div>

<script>
/* TYPEWRITER EFFECT */
function typeText(id, text) {
    let el = document.getElementById(id); el.innerHTML = "";
    let i = 0;
    function t() { if (i < text.length) { el.innerHTML += text[i++]; setTimeout(t, 25); } }
    t();
}

/* NAVIGATION */
function next(id) {
    document.querySelectorAll(".task").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
    window.scrollTo(0, 0);
}

/* MUSIC */
let started = false;
document.body.addEventListener("click", () => {
    if (!started) {
        document.getElementById("song1").play();
        started = true;
    }
});

/* MESSAGES */
let msg1 = `It's not just a task Maria. It proves your patience. Please Maria, just keep little patience more. I swore, I will make everything better and okey`;
let msg2 = `Maria amader moddhe onek jhamela onek raga ragi onek issues ashtei pare tokhon hoito amra ektu distract hoye jabo kintu tmi r Ami mile abr ek hoye jabo shob kichu solve kore jemon ta ei couple chobir missing part ta khuje ber kore complete couple hoye gelam`;
let msg3 = `only you have the key to my heart. No one else can be like you never ever. Maria, I don't even know when I've fallen this much to you. Actually I can't think without you, without talking to you I suffocate. Amr body r whole physiology ekhon tmr opor depend kore chole. Tmi Chara Ami Kono na Kono system disfunctional hoye Jai.`;
let msg4_1 = `Maria ,you see this two hands. Yes, it's yours and mine. Tmi ki kheyal krocho Maria tmi r Ami jokhn Kokhn o ek sathe ber hoi ghurte Jai amra kotto Happy thaki oi time e amader mone hoi amra Chara keu nai just you and me in this entire world. Time gulo koto fastly chole jai mone hoi matro amra ashlam. Egular reason ki Jano? Reason hocche when we are together we became best duo, best couple and the happiest . Maria I just want to be that best duo ever and ever and I want to enriched my memory with the this kind of special moments with you.`;
let msg4_2 = `Maria, Like image I want to embrace you , adore you and wishing you to be my entire world for ever. No matter what comes to us I'll never lose you.`;
let msg4_3 = `You see this girl? Etokkhn jakey niye jar jonne eto kichu bollam etai hocche amar amar life er shob theke special one the most precious one. You know Ami kotto lucky? Shobai Chad dekhe akashe eta dekhar jonne koto higher magnification er microscope age but amr chad Ami jokhn iccha tokhn dekhte pari karon you are my " Eid er Chad " Jar sather prottekta ta special moments amr Jonne Chad rat Hoye Jai. And I'm wishing Eid Mubarak to my Eid er Chad "Eid Mubarak, Maria`;

/* TASK 1 LOGIC (UPDATED) */
let area = document.getElementById("gameArea");
let paddle = document.createElement("div");
paddle.style.width = "100px"; paddle.style.height = "15px"; paddle.style.background = "#fff";
paddle.style.position = "absolute"; paddle.style.bottom = "10px"; paddle.style.left = "150px";
paddle.style.borderRadius = "10px";
area.appendChild(paddle);

area.onmousemove = e => {
    let r = area.getBoundingClientRect();
    let x = e.clientX - r.left - 50;
    if (x < 0) x = 0; if (x > 300) x = 300;
    paddle.style.left = x + "px";
};

// Mobile Touch Support
area.ontouchmove = e => {
    let r = area.getBoundingClientRect();
    let x = e.touches[0].clientX - r.left - 50;
    if (x < 0) x = 0; if (x > 300) x = 300;
    paddle.style.left = x + "px";
    e.preventDefault();
};

let caught = 0, firstDone = false, target = 20;

function drop(speed) {
    let h = document.createElement("div");
    h.innerText = "❤️";
    h.style.position = "absolute"; h.style.fontSize = "28px";
    h.style.left = Math.random() * 360 + "px";
    let p = -40;

    let f = setInterval(() => {
        p += speed;
        h.style.top = p + "px";
        let pr = paddle.getBoundingClientRect();
        let hr = h.getBoundingClientRect();

        if (hr.bottom >= pr.top && hr.left < pr.right && hr.right > pr.left) {
            clearInterval(f); h.remove(); caught++;
            if (!firstDone) {
                firstDone = true;
                for (let i = 0; i < 80; i++) {
                    setTimeout(() => drop(4 + Math.random() * 3), i * 500);
                }
            }
            if (caught >= target) next("task1done");
        }
        if (p > 400) { clearInterval(f); h.remove(); }
    }, 30);
    area.appendChild(h);
}
// Speed 0.4 ensures 30sec duration for 400px drop
setTimeout(() => drop(0.4), 1000);

/* TASK 2 LOGIC (UPDATED) */
function showHint() {
    typeText("hintBox", "Find the missing part from these 🖼️ emojis. Click the right one to complete the couple!");
}

let emojiArea = document.getElementById("emojiArea");
let correctIndex = Math.floor(Math.random() * 40);
let isFound = false;

for (let i = 0; i < 40; i++) {
    let e = document.createElement("span");
    e.className = "emoji-item";
    e.innerText = "🖼️";
    e.style.top = Math.random() * 280 + "px";
    e.style.left = Math.random() * 85 + "%";

    e.onclick = () => {
        if (isFound) return;
        if (i === correctIndex) {
            isFound = true;
            typeText("t2msg", "Perfect! You found the missing part.");
            let fImg = document.createElement("img");
            fImg.src = "female.jpeg";
            let dz = document.getElementById("dropZone");
            dz.innerHTML = "";
            dz.appendChild(fImg);
            setTimeout(() => next("task2done"), 2500);
        } else {
            typeText("t2msg", "Not this one, keep searching!");
            e.style.opacity = "0.2";
        }
    };
    emojiArea.appendChild(e);
}

/* TASK 3 LOGIC */
function tryKey(k) {
    if (k === 3) {
        document.getElementById("heart").innerHTML = "❤️";
        document.getElementById("heart").style.transform = "scale(1.5)";
        document.getElementById("t3btn").style.display = "block";
        document.getElementById("go4").style.display = "block";
    } else {
        alert("Wrong key! Try another one.");
    }
}

/* TASK 4 LOGIC */
function reveal(img, num) {
    img.classList.remove("blur");
    img.nextElementSibling.style.display = "none";
    if (num == 3) {
        document.getElementById("song1").pause();
        document.getElementById("song2").play();
    }
}

/* TASK 5 LOGIC */
function startGift() {
    typeText("giftBox", "Sending your Eid Salami… ⏳");
    setTimeout(() => typeText("giftBox", "A little something… just for you 💖"), 2500);
    setTimeout(() => {
        next("finalScreen");
        typeText("finalMsg", "Salami is just an excuse…\nI just wanted to make you smile this Eid\n\nCheck your bKash 💸");
    }, 5000);
}
</script>
</body>
</html>
