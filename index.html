<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Maria ❤️</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:linear-gradient(to right,#ff9a9e,#fad0c4);
}

.task{display:none;}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
}

.big{font-size:24px;font-weight:bold;}

.msgBox{
  background:white;
  padding:15px;
  width:80%;
  margin:auto;
  border-radius:10px;
  font-weight:bold;
  min-height:60px;
  color:#d63384;
}

#gameArea{
  width:400px;height:400px;background:#111;margin:auto;position:relative;overflow:hidden;
}

.blur{filter:blur(10px);}
.tap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<audio id="song1" src="song1.mp3" loop></audio>
<audio id="song2" src="song2.mp3" loop></audio>

<!-- ================= TASK 1 (FIXED) ================= -->
<div id="task1" class="task" style="display:block">
<h2 class="big">Something for you Maria </h2>
<h3>Catch my 10 hearts ❤️</h3>
<div id="gameArea"></div>
</div>

<div id="task1done" class="task">
<h2>Welcome you have completed the task</h2>
<button onclick="typeText('t1msg',msg1)">Tap to read message</button>
<div class="msgBox" id="t1msg"></div>
<button onclick="next('task2')">Next</button>
</div>

<!-- ================= TASK 2 ================= -->
<div id="task2" class="task">
<h2>Find the missing part of me</h2>

<button onclick="showHint()">Tap to read Hint 💡</button>
<div class="msgBox" id="hintBox"></div>

<div style="width:320px;height:220px;border:2px solid white;margin:auto;position:relative;overflow:hidden;">
<img src="male.jpeg" style="width:50%;position:absolute;right:0;top:0;">
<div id="dropZone" style="width:50%;height:100%;position:absolute;left:0;"></div>
</div>

<div id="emojiArea" style="height:320px;position:relative;margin-top:20px;"></div>

<div class="msgBox" id="t2msg"></div>
</div>

<div id="task2done" class="task">
<h2>Welcome you have completed the task</h2>
<button onclick="typeText('t2done',msg2)">Tap to read message</button>
<div class="msgBox" id="t2done"></div>
<button onclick="next('task3')">Next</button>
</div>

<!-- ================= TASK 3 ================= -->
<div id="task3" class="task">
<h2>Open my heart 🔒</h2>

<button onclick="tryKey(1)">Key-1</button>
<button onclick="tryKey(2)">Key-2</button>
<button onclick="tryKey(3)">Key-3</button>

<div id="heart" style="font-size:60px;">🔒</div>

<button id="t3btn" style="display:none;" onclick="typeText('t3msg',msg3)">Tap to read message</button>
<div class="msgBox" id="t3msg"></div>

<button id="go4" style="display:none;" onclick="next('task4_1')">Tap here and Let's go forward</button>
</div>

<!-- ================= TASK 4 ================= -->
<div id="task4_1" class="task">
<div style="position:relative;">
<img src="maria1.jpeg" class="blur" onclick="reveal(this,1)">
<div class="tap">Tap to see</div>
</div>
<button onclick="typeText('m1',msg4_1)">Tap to read message</button>
<div class="msgBox" id="m1"></div>
<button onclick="next('task4_2')">Next</button>
</div>

<div id="task4_2" class="task">
<div style="position:relative;">
<img src="maria2.jpeg" class="blur" onclick="reveal(this,2)">
<div class="tap">Tap to see</div>
</div>
<button onclick="typeText('m2',msg4_2)">Tap to read message</button>
<div class="msgBox" id="m2"></div>
<button onclick="next('task4_3')">Next</button>
</div>

<div id="task4_3" class="task">
<div style="position:relative;">
<img src="maria3.jpeg" class="blur" onclick="reveal(this,3)">
<div class="tap">Tap to see</div>
</div>
<button onclick="typeText('m3',msg4_3)">Tap to read message</button>
<div class="msgBox" id="m3"></div>
<button onclick="next('task5')">Tap here and Lets celebrate together</button>
</div>

<!-- ================= TASK 5 ================= -->
<div id="task5" class="task">
<h2> Eid Salami 💖</h2>
<button onclick="startGift()">Open your Eid gift 🎁</button>
<div class="msgBox" id="giftBox"></div>
</div>

<div id="finalScreen" class="task">
<h2>💖 Eid Mubarak Maria ❤️</h2>
<div class="msgBox" id="finalMsg"></div>
</div>

<script>

/* COMMON */
function typeText(id,text){
let el=document.getElementById(id); el.innerHTML="";
let i=0;
function t(){ if(i<text.length){ el.innerHTML+=text[i++]; setTimeout(t,20);} }
t();
}

function next(id){
document.querySelectorAll(".task").forEach(t=>t.style.display="none");
document.getElementById(id).style.display="block";
}

/* MUSIC */
let started=false;
document.body.addEventListener("click",()=>{
if(!started){
document.getElementById("song1").play();
started=true;
}
});

/* TEXT */
let msg1=`It's not just a task Maria. It proves your patience. Please Maria, just keep little patience more. I swore, I will make everything better and okey.`;
let msg2=`Maria amader moddhe onek jhamela onek raga ragi onek issues ashtei pare tokhon hoito amra ektu distract hoye jabo kintu tmi r Ami mile abr ek hoye jabo shob shomossha solve kore jemon ta ei couple chobir missing part ta khuje ber kore complete couple hoye gelam.`;
let msg3=`only you have the key to my heart. No one else can be like you never ever. Maria, I don't even know when I've fallen this much to you. Actually I can't think without you, without talking to you I suffocate. Amr body r whole physiology ekhon tmr opor depend kore chole. Tmi Chara Ami Kono na Kono system disfunctional hoye Jai.`;
let msg4_1=`Maria ,you see this two hands. Yes, it's yours and mine. 
Tmi ki kheyal krocho Maria tmi r Ami jokhn Kokhn o ek sathe ber hoi ghurte Jai amra kotto Happy thaki oi time e amader mone hoi amra Chara keu nai just you and me in this entire world. Time gulo koto fastly chole jai mone hoi matro amra ashlam. Egular reason ki Jano?
Reason hocche when we are together we became best duo, best couple and  the happiest .
Maria I just want to be that best duo ever and ever and I want to enriched my memory with the this kind of special moments with you.`;
let msg4_2=`Maria, Like  image I want to embrace you , adore you and wishing you to be my entire world for ever. No matter what comes to us I'll never lose you.`;
let msg4_3=`You see this girl?
Etokkhn jakey niye jar jonne eto kichu bollam etai hocche amar amar life er shob theke special one the most precious one.
You know Ami kotto lucky? Shobai Chad dekhe akashe  eta dekhar jonne koto higher magnification er microscope age but amr chad Ami jokhn iccha tokhn dekhte pari karon you are my " Eid er Chad " 
Jar sather prottekta ta special moments amr Jonne Chad rat Hoye Jai.
And I'm wishing Eid Mubarak to my Eid er Chad
"Eid Mubarak, Maria "`;

/* ================= TASK 1 FIX ================= */
let area=document.getElementById("gameArea");

let paddle=document.createElement("div");
paddle.style.width="100px";
paddle.style.height="8px";
paddle.style.background="white";
paddle.style.position="absolute";
paddle.style.bottom="10px";
paddle.style.left="150px";
area.appendChild(paddle);

area.onmousemove=e=>{
let rect=area.getBoundingClientRect();
let x=e.clientX-rect.left-50;
if(x<0)x=0;
if(x>300)x=300;
paddle.style.left=x+"px";
};

let caught=0,firstCaught=false,target=10;

function createHeart(speed){
let h=document.createElement("div");
h.innerText="❤️";
h.style.position="absolute";
h.style.left=Math.random()*360+"px";
h.style.top="0px";
area.appendChild(h);

let pos=0;

let fall=setInterval(()=>{
pos+=speed;
h.style.top=pos+"px";

let pr=paddle.getBoundingClientRect();
let hr=h.getBoundingClientRect();

if(hr.bottom>=pr.top && hr.left<pr.right && hr.right>pr.left){
clearInterval(fall);
h.remove();
caught++;

if(!firstCaught){
firstCaught=true;
for(let i=0;i<50;i++){
setTimeout(()=>createHeart(12+Math.random()*8),i*120);
}
}

if(caught>=target) next("task1done");
}

if(pos>400){
clearInterval(fall);
h.remove();
}
},30);
}

setTimeout(()=>createHeart(0.2),100);

/* ================= TASK 2 ================= */
function showHint(){
typeText("hintBox","Find missing image from this 🖼️ emoji and click it.");
}

let emojiArea=document.getElementById("emojiArea");
let correct=Math.floor(Math.random()*30);
let found=false;

for(let i=0;i<30;i++){
let e=document.createElement("span");
e.innerText="🖼️";
e.style.position="absolute";
e.style.fontSize="36px";
e.style.top=Math.random()*280+"px";
e.style.left=Math.random()*90+"%";

e.onclick=()=>{
if(found)return;

if(i===correct){
found=true;
typeText("t2msg","You found the missing part ");

let f=document.createElement("img");
f.src="female.jpeg";
f.style.width="50%";
f.style.position="absolute";
f.style.left="0";
f.style.bottom="-150px";
document.getElementById("dropZone").appendChild(f);

let pos=-150;
let anim=setInterval(()=>{
pos+=5;
f.style.bottom=pos+"px";
if(pos>=0) clearInterval(anim);
},20);

setTimeout(()=>next("task2done"),1000);

}else{
typeText("t2msg","Not this one keep searching");
}
};

emojiArea.appendChild(e);
}

/* ================= TASK 3 ================= */
function tryKey(k){
if(k===3){
document.getElementById("heart").innerHTML="❤️";
document.getElementById("t3btn").style.display="block";
document.getElementById("go4").style.display="block";
}
}

/* ================= TASK 4 ================= */
function reveal(img,num){
img.classList.remove("blur");
if(num==3){
document.getElementById("song1").pause();
document.getElementById("song2").play();
}
}

/* ================= TASK 5 ================= */
function startGift(){
typeText("giftBox","Sending your Eid Salami… ⏳");

setTimeout(()=>{
typeText("giftBox","A little something… just for you 💖");
},2000);

setTimeout(()=>{
next("finalScreen");
typeText("finalMsg","Salami is just an excuse… I just wanted to make you smile this Eid 😌❤️ Check your bKash 😌❤️");
},4500);
}

</script>

</body>
</html>
